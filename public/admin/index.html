<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Portal | Duckland</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <div class="actions" style="margin-bottom: 1rem">
        <a class="btn secondary" href="/">Home</a>
        <a class="btn secondary" href="/users">Users</a>
      </div>

      <section class="panel">
        <div class="actions" style="justify-content: space-between; align-items: center">
          <h1 style="margin: 0">Pending Duck Requests</h1>
          <button id="refresh" class="secondary" type="button">Refresh</button>
        </div>
        <p class="muted">Approved ducks are hidden from this list.</p>
        <small id="admin-status" class="muted"></small>
        <div id="pending-list" class="cards" style="margin-top: 0.75rem"></div>
      </section>
    </main>

    <script type="module" src="/admin/app.js"></script>
  </body>
</html>
